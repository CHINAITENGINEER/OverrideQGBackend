# 宿舍报修 — Nginx 示例（独立可启动）
#
# 启动（在 dormitory-repair 目录下，且已安装 nginx 二进制）：
#   nginx -p "%CD%" -c nginx/nginx.conf
# Linux/Mac：
#   nginx -p "$(pwd)" -c nginx/nginx.conf
#
# 说明：
#   - root 指向本仓库的 frontend 目录（与 backend 并列）
#   - /api/ 反代到 Spring Boot（默认 127.0.0.1:8080）
#   - 前端 fetch 使用相对路径 /api/... 与 credentials:'include' 即可携带 Session

worker_processes  1;
error_log  logs/error.log  info;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    types {
        text/html                 html;
        text/css                  css;
        application/javascript    js;
        application/json          json;
    }
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # -p 为 dormitory-repair 时，静态资源目录为 ./frontend
        root   frontend;
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Cookie            $http_cookie;
            proxy_cookie_path  / /;
        }
    }
}
